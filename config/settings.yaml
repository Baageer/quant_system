project:
  name: "quant_system"
  version: "1.0.0"
  description: "量化交易系统"

data:
  source: "akshare"
  stock_file: "./data/test5.txt"
  cache_dir: "./data/raw/tmp_akshare"
  processed_dir: "./data/processed/tmp_akshare"
  
backtest:
  start_date: "2020-01-01"
  end_date: "2024-12-31"
  initial_capital: 1000000
  commission_rate: 0.0003
  slippage: 0.0001
  
strategy:
  rebalance_freq: "monthly"
  max_position_pct: 0.05
  min_position_pct: 0.01
