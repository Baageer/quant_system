timing_strategies:
  ma_cross:
    name: "双均线交叉策略"
    module: "signals.timing.ma_cross"
    class: "MACrossStrategy"
    params:
      short_window: 5
      long_window: 20
      use_filter: true
      ma_filter_window: 30
    min_data_length: 30
    description: "短期均线上穿长期均线做多，下穿做空"
  
  rsi:
    name: "RSI策略"
    module: "signals.timing.rsi"
    class: "RSIStrategy"
    params:
      window: 14
      oversold: 30
      overbought: 70
      mode: "standard"
    min_data_length: 20
    description: "RSI超卖做多，超买卖出"
  
  rsi_cross:
    name: "RSI穿越策略"
    module: "signals.timing.rsi"
    class: "RSIStrategy"
    params:
      window: 14
      oversold: 30
      overbought: 70
      mode: "cross"
    min_data_length: 20
    description: "RSI穿越超卖超买线产生信号"
  
  macd:
    name: "MACD策略"
    module: "signals.timing.macd"
    class: "MACDStrategy"
    params:
      fast_period: 12
      slow_period: 26
      signal_period: 9
      mode: "cross"
    min_data_length: 35
    description: "MACD金叉做多，死叉做空"
  
  macd_histogram:
    name: "MACD柱状图策略"
    module: "signals.timing.macd"
    class: "MACDStrategy"
    params:
      fast_period: 12
      slow_period: 26
      signal_period: 9
      mode: "histogram"
    min_data_length: 35
    description: "MACD柱状图由负转正做多，由正转负做空"
  
  bollinger_breakout:
    name: "布林带突破策略"
    module: "signals.timing.bollinger_bands"
    class: "BollingerBandsStrategy"
    params:
      window: 20
      num_std: 2.0
      mode: "breakout"
    min_data_length: 25
    description: "价格突破上轨做多，跌破下轨做空"
  
  bollinger_mean_reversion:
    name: "布林带均值回归策略"
    module: "signals.timing.bollinger_bands"
    class: "BollingerBandsStrategy"
    params:
      window: 20
      num_std: 2.0
      mode: "mean_reversion"
    min_data_length: 25
    description: "价格触及上轨回落后做空，触及下轨反弹后做多"
  
  bollinger_squeeze:
    name: "布林带收窄突破策略"
    module: "signals.timing.bollinger_bands"
    class: "BollingerBandsStrategy"
    params:
      window: 20
      num_std: 2.0
      mode: "squeeze"
      squeeze_threshold: 0.1
    min_data_length: 25
    description: "布林带收窄后等待突破方向"
  
  bollinger_double:
    name: "布林带双确认突破策略"
    module: "signals.timing.bollinger_bands"
    class: "BollingerBandsStrategy"
    params:
      window: 20
      num_std: 2.0
      mode: "double"
      confirm_bars: 2
    min_data_length: 25
    description: "价格连续N根K线收于轨道外产生信号"

stop_strategies:
  stop_loss:
    name: "止损策略"
    module: "signals.stop.stop_loss"
    class: "StopLossStrategy"
    params:
      loss_pct: 0.060
      loss_type: "absolute"
    min_data_length: 20
    description: "价格跌破止损价格时触发止损"
  
  stop_profit:
    name: "止盈策略"
    module: "signals.stop.stop_profit"
    class: "StopProfitStrategy"
    params:
      profit_pct: 0.500
      profit_type: "absolute"
    min_data_length: 20
    description: "价格超过止盈价格时触发止盈"

backtest:
  default_strategy: "ma_cross"
  trade_amount: 10000
  initial_capital: 1000000
  commission_rate: 0.0003
  slippage: 0.0001
