timing_strategies:
  ma_cross:
    name: "双均线交叉策略"
    module: "signals.timing.ma_cross"
    class: "MACrossStrategy"
    params:
      short_window: 5
      long_window: 20
      use_filter: true
      ma_filter_window: 30
    min_data_length: 30
    description: "短期均线上穿长期均线做多，下穿做空"
  
  rsi:
    name: "RSI策略"
    module: "signals.timing.rsi"
    class: "RSIStrategy"
    params:
      window: 14
      oversold: 30
      overbought: 70
      mode: "standard"
    min_data_length: 20
    description: "RSI超卖做多，超买卖出"
  
  rsi_cross:
    name: "RSI穿越策略"
    module: "signals.timing.rsi"
    class: "RSIStrategy"
    params:
      window: 14
      oversold: 30
      overbought: 70
      mode: "cross"
    min_data_length: 20
    description: "RSI穿越超卖超买线产生信号"
  
  macd:
    name: "MACD策略"
    module: "signals.timing.macd"
    class: "MACDStrategy"
    params:
      fast_period: 12
      slow_period: 26
      signal_period: 9
      mode: "cross"
    min_data_length: 35
    description: "MACD金叉做多，死叉做空"
  
  macd_histogram:
    name: "MACD柱状图策略"
    module: "signals.timing.macd"
    class: "MACDStrategy"
    params:
      fast_period: 12
      slow_period: 26
      signal_period: 9
      mode: "histogram"
    min_data_length: 35
    description: "MACD柱状图由负转正做多，由正转负做空"
  
  bollinger_breakout:
    name: "布林带突破策略"
    module: "signals.timing.bollinger_bands"
    class: "BollingerBandsStrategy"
    params:
      window: 20
      num_std: 2.0
      mode: "breakout"
      use_trend_filter: true
      trend_window: 60
      use_volume_filter: true
      volume_window: 20
      volume_multiplier: 1.2
    min_data_length: 25
    description: "价格突破轨道并结合趋势与放量确认方向"
  
  bollinger_mean_reversion:
    name: "布林带均值回归策略"
    module: "signals.timing.bollinger_bands"
    class: "BollingerBandsStrategy"
    params:
      window: 20
      num_std: 2.0
      mode: "mean_reversion"
    min_data_length: 25
    description: "价格触及上轨回落后做空，触及下轨反弹后做多"
  
  bollinger_squeeze:
    name: "布林带收窄突破策略"
    module: "signals.timing.bollinger_bands"
    class: "BollingerBandsStrategy"
    params:
      window: 20
      num_std: 2.0
      mode: "squeeze"
      squeeze_threshold: 0.1
      use_trend_filter: true
      trend_window: 60
      use_volume_filter: true
      volume_window: 20
      volume_multiplier: 2
    min_data_length: 25
    description: "布林带收窄后结合趋势与放量确认突破方向"
  
  bollinger_double:
    name: "布林带双确认突破策略"
    module: "signals.timing.bollinger_bands"
    class: "BollingerBandsStrategy"
    params:
      window: 20
      num_std: 2.0
      mode: "double"
      confirm_bars: 2
      use_trend_filter: true
      trend_window: 60
      use_volume_filter: true
      volume_window: 20
      volume_multiplier: 1.2
    min_data_length: 25
    description: "价格连续确认突破后，再结合趋势与放量入场"

  volume_breakout:
    name: "成交量突破策略"
    module: "signals.timing.volume"
    class: "VolumeBreakoutStrategy"
    params:
      volume_window: 20
      z_thresh: 2.0
      trend_window: 50
      price_col: "close"
      volume_col: "volume"
    min_data_length: 50
    description: "成交量显著放大且价格位于趋势线上方做多，下方做空"

  obv:
    name: "OBV指标策略"
    module: "signals.timing.volume"
    class: "OBVStrategy"
    params:
      obv_window: 20
      price_col: "close"
      volume_col: "volume"
    min_data_length: 20
    description: "OBV斜率配合价格趋势判断多空方向"

  mfi:
    name: "MFI资金流量策略"
    module: "signals.timing.volume"
    class: "MFIStrategy"
    params:
      mfi_window: 14
      overbought: 80
      oversold: 20
      trend_window: 50
      high_col: "high"
      low_col: "low"
      close_col: "close"
      volume_col: "volume"
    min_data_length: 50
    description: "MFI穿越超买超卖阈值并结合趋势确认交易方向"

  volume_price_divergence:
    name: "量价背离策略"
    module: "signals.timing.volume"
    class: "VolumePriceDivergenceStrategy"
    params:
      window: 20
      price_col: "close"
      volume_col: "volume"
    min_data_length: 20
    description: "价格创新高但量能未同步，或价格创新低但量能逆势放大时产生信号"

stop_strategies:
  stop_loss:
    name: "止损策略"
    module: "signals.stop.stop_loss"
    class: "StopLossStrategy"
    params:
      loss_pct: 0.060
      loss_type: "atr"
      atr_window: 14
      atr_multiplier: 1
    min_data_length: 20
    description: "价格跌破止损价格时触发止损"
  
  stop_profit:
    name: "止盈策略"
    module: "signals.stop.stop_profit"
    class: "StopProfitStrategy"
    params:
      profit_pct: 0.07500
      profit_type: "trailing"
      atr_window: 14
      atr_multiplier: 2
    min_data_length: 20
    description: "价格超过止盈价格时触发止盈"

